# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Publish to npm

on:
  release:
    # Unlike in the original at the above link, only publish stable releases to npm, not prereleases & drafts
    types: [released] 

permissions:
  id-token: write  # Required for npm trusted publishing
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - name: Verify release tag matches package.json version
        shell: bash
        run: |
          TAG="$GITHUB_REF_NAME"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Release tag must start with 'v'. Got: $TAG"
            exit 1
          fi

          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

          echo "::notice::Release tag $TAG matches package.json version $PKG_VERSION"

      - run: npm clean-install
      - name: Run automated tests
        run: npm test

  publish-npm:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
          registry-url: https://registry.npmjs.org/
      - name: Install dependencies
        run: npm clean-install
      - name: Build
        run: npm run build
      - name: Publish
        run: npm publish --access public --provenance
